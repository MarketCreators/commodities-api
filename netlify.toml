[build]
  publish = "public"
  command = "pip3 install -r requirements.txt --target netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/prices"
  to = "/.netlify/functions/api/prices"
  status = 200

[[redirects]]
  from = "/prices/*"
  to = "/.netlify/functions/api/prices/:splat"
  status = 200

[[redirects]]
  from = "/cache/status"
  to = "/.netlify/functions/api/cache/status"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200